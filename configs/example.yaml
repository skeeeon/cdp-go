# cdp-nats-bridge example configuration.
# All keys are optional; anything omitted falls back to the built-in default.
# Env vars and command-line flags override values set here.

# CDP listener
group: 239.255.76.67
port: 7667
# iface: eth0
prefix: cdp
# udp_read_buffer: 1048576   # bytes; raise on dense networks if `netstat -su` shows RcvbufErrors. Kernel may cap at net.core.rmem_max.

logger:
  level: info  # debug | info | warn | error

broker:
  url: nats://localhost:4222
  name: cdp-nats-bridge

  # --- Auth (uncomment ONE of the following sets) ---
  # user: alice
  # password: secret
  #
  # token: s3cret-token
  #
  # creds_file: /etc/nats/cdp.creds
  #
  # nkey_seed_file: /etc/nats/cdp.nk

  # --- TLS (only when url uses tls://) ---
  # tls_ca: /etc/nats/ca.pem
  # tls_cert: /etc/nats/client.pem
  # tls_key: /etc/nats/client.key
  # tls_insecure: false

  # --- Reconnect tuning ---
  max_reconnects: -1          # -1 = forever
  reconnect_wait: 2s
  reconnect_jitter: 100ms
  ping_interval: 2m
  max_pings_out: 2
  flush_timeout: 5s           # blocks shutdown until pending publishes flush, or this fires
  no_echo: false

# Optional: 2D polygon geofencing on PositionV3 packets. If `zones` is
# empty (or this whole block is absent), the feature is disabled and the
# bridge runs exactly as it did before geofencing was added.
#
# Vertex coordinates are int32 millimeters — the same units PositionV3
# uses on the wire. (The Python implementation used floats; this port
# standardizes on integer mm to eliminate float-comparison foot-guns.)
#
# Output: one NATS message per zone enter/exit on subject
#   <prefix>.<enter|exit>.<tag_serial_hex8>.<zone_slug>
# where zone_slug is the lowercased name with NATS-illegal characters
# (`.`, `>`, `*`, whitespace) replaced by underscores.
#
# geofence:
#   hysteresis: 5    # consecutive packets a new zone state must hold before commit; 0|1 = immediate
#   prefix: geofence
#   tag_ttl: 1h      # drop a tag's per-tag state if no position update for this long; 0 disables
#   zones:
#     - name: Paper
#       vertices: [[0, 0], [10000, 0], [10000, 10000], [0, 10000]]
#       rgb: [255, 255, 0]
#     - name: Loading Dock
#       vertices: [[20000, 0], [30000, 0], [25000, 10000]]
#       rgb: [0, 0, 255]
